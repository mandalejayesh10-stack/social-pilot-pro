version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: socialpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: socialpilot_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: socialpilot-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    # Pull the model on first start
    # Run: docker exec socialpilot-ollama ollama pull llama3.2

volumes:
  postgres_data:
  ollama_data:
